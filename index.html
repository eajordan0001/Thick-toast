<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>厚片吐司團購助手</title>
    <style>
        :root { --main: #e67e22; --dark: #2c3e50; --line: #00B900; --red: #e74c3c; --bg: #fdf5e6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, "Noto Sans TC", sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); margin: 0; padding-bottom: 300px; color: #333; }
        
        /* 固定標題 */
        .header { background: #ba8b5e; color: #fff; text-align: center; padding: 12px; font-weight: bold; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #8e5e31; height: 48px; }
        
        .user-nav { background: #3e2723; display: flex; overflow-x: auto; padding: 12px; gap: 10px; align-items: center; min-height: 65px; border-bottom: 2px solid #000; scrollbar-width: none; }
        .user-nav::-webkit-scrollbar { display: none; }
        .btn-add { background: #fff; color: #3e2723; padding: 10px 18px; border-radius: 25px; font-weight: bold; font-size: 14px; border: none; flex-shrink: 0; cursor: pointer; }
        .user-tab { background: #5d4037; color: #d7ccc8; padding: 10px 18px; border-radius: 25px; white-space: nowrap; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .user-tab.active { background: #fff; color: #3e2723; font-weight: bold; }
        .cart-count { background: var(--main); color: #fff; border-radius: 50%; font-size: 11px; padding: 1px 6px; margin-left: -5px; }
        .del-u { color: var(--red); font-weight: bold; font-size: 18px; padding-left: 5px; }
        
        /* 優化：改為 4欄 2列 的固定網格 */
        .price-nav { 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, auto);
            gap: 6px;
            padding: 10px; 
            background: #fff; 
            border-bottom: 1px solid #ddd; 
            position: sticky; 
            top: 48px; 
            z-index: 900; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .nav-price-btn { 
            background: #f0e6dd; 
            color: #5d4037; 
            border: 1px solid #d7ccc8; 
            padding: 8px 0; 
            border-radius: 10px; 
            font-size: 13px; 
            font-weight: bold; 
            text-align: center;
            cursor: pointer; 
        }
        .nav-price-btn:active { background: #ba8b5e; color: #fff; border-color: #ba8b5e; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #d7ccc8; }
        .card-body { padding: 20px; }
        .section-h { font-weight: bold; margin: 25px 0 10px; display: block; font-size: 15px; color: #5d4037; border-left: 5px solid #ba8b5e; padding: 5px 10px; background: #f9f4f0; }
        
        .opt-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border: 1px solid #eee; border-radius: 12px; background: #fafafa; cursor: pointer; margin-bottom: 6px; }
        .opt-row.active { border-color: #ba8b5e; background: #fff9f0; }
        .opt-name { flex: 1; font-size: 14px; font-weight: bold; }
        .qty-controls { display: flex; align-items: center; gap: 4px; visibility: hidden; }
        .opt-row.active .qty-controls { visibility: visible; }
        .qty-btn { background: #d7ccc8; color: #3e2723; border: none; border-radius: 5px; font-weight: bold; width: 32px; height: 32px; cursor: pointer; }
        .qty-input { width: 45px; height: 32px; text-align: center; border: 1px solid #ccc; border-radius: 5px; font-weight: bold; }
        .btn-quick-add { background: var(--main); color: white; border: none; border-radius: 5px; width: 35px; height: 32px; font-weight: bold; cursor: pointer; }
        
        .coop-panel { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 2px solid #ba8b5e; z-index: 1000; padding: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }
        .coop-textarea { width: 100%; height: 80px; border: 1px solid #ccc; border-radius: 10px; padding: 10px; font-size: 13px; resize: none; margin-bottom: 8px; }
        .coop-btns { display: flex; gap: 10px; }
        .btn-organize { flex: 1; background: #3e2723; color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; }
        .btn-final-line { flex: 1; background: var(--line); color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; }
        .summary-info { font-size: 14px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .log-list { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 14px; line-height: 1.6; border: 1px solid #eee; }
        .input-box { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; margin-top: 10px; }
        .order-item { background: #fff; margin-top: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">厚片吐司團購助手</div>

<div class="user-nav" id="tabs"></div>

<div class="container">
    <div id="welcome" style="text-align:center; padding: 40px 20px;">
        <div style="font-size: 50px;">🍞</div>
        <h3>貼上清單或對話內容</h3>
        <p style="font-size:13px; color:#888;">系統將根據片數自動計算累積運費與分箱補貼</p>
    </div>

    <div id="order-ui" style="display:none">
        <div style="background: #fffbe6; color: #d35400; text-align: center; padding: 8px; font-size: 12px; font-weight: bold;">
            🚚 滿 520 片免運費 / 口味請以 5 的倍數下單
        </div>
        
        <div class="price-nav" id="price-nav"></div>
        
        <div class="card">
            <div class="card-body">
                <h2 id="cur-u-name" style="margin:0; color:#3e2723; margin-bottom:15px;"></h2>
                <div id="menu-container"></div>
            </div>
        </div>
        <div id="items-box"></div>
    </div>
</div>

<div class="coop-panel">
    <div class="summary-info">
        <div>總計：<b id="t-qty" style="color:var(--main)">0</b> 片</div>
        <div style="font-size: 12px; color: #888;">應付：$<span id="total">0</span></div>
    </div>
    <textarea class="coop-textarea" id="coop-input" placeholder="可貼上對話內容進行整理..."></textarea>
    <div class="coop-btns">
        <button class="btn-organize" onclick="organizeText()">整理清單</button>
        <button class="btn-final-line" onclick="goLine()">匯出最終 LINE</button>
    </div>
</div>

<div class="modal-bg" id="report-modal">
    <div class="modal-content">
        <h3>🔍 整理預覽</h3>
        <div class="log-list" id="report-list"></div>
        <div style="display:flex;gap:10px;">
            <button onclick="closeReport(false)" style="flex:1;padding:12px;border:none;border-radius:10px;background:#eee;">取消</button>
            <button onclick="closeReport(true)" style="flex:1;padding:12px;border:none;border-radius:10px;background:var(--main);color:#fff;font-weight:bold;">確定匯入並清空</button>
        </div>
    </div>
</div>

<div class="modal-bg" id="modal">
    <div class="modal-content">
        <h3>新增開單姓名</h3>
        <input type="text" id="name-in" class="input-box">
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button onclick="showM(false)" style="flex:1;padding:12px;border:none;border-radius:10px;">取消</button>
            <button onclick="addU()" style="flex:1;padding:12px;border:none;border-radius:10px;background:var(--main);color:#fff;">確定</button>
        </div>
    </div>
</div>

<script>
    let users=[], cur=-1;
    let tempOrders = [];
    const STORAGE_KEY = 'toast_helper_v8';
    const menuData = [
        { price: 18, items: ["野生藍莓", "甜心草莓", "巧克力", "爆漿奶油", "芝麻花生", "奶酥", "曼特寧咖啡"] },
        { price: 21, items: ["甲仙芋頭", "萬丹紅豆", "太妃糖", "花生大王"] },
        { price: 23, items: ["濃郁蒜香", "培根蔥花", "起士肉鬆", "蔥花熱狗", "肉鬆火腿", "高鈣起士", "起士火腿", "茄汁披薩", "新鮮蔥花", "玉米焗烤", "蔥花肉鬆", "養生南瓜", "摩卡可可"] },
        { price: 28, items: ["鮪魚玉米", "玉米蛋沙拉", "鮪魚洋蔥", "乳酪馬鈴薯", "法式青醬"] },
        { price: 31, items: ["芋頭肉鬆", "咖啡Q朵"] },
        { price: 38, items: ["經典乳酪", "奶黃先生", "紅豆軟軟"] },
        { price: 43, items: ["濃厚乳酪", "日式明太子", "奧利奧超人"] },
        { price: 49, items: ["抹茶叔叔", "提拉米蘇"] }
    ];

    function getFeeInfo(totalQty) {
        if (totalQty === 0) return { fee: 0, note: "" };
        if (totalQty >= 520) return { fee: 0, note: "$0（滿520片免運）" };
        
        const feeTable = [
            { max: 20, fee: 240, label: "1-20片" },
            { max: 50, fee: 260, label: "21-50片" },
            { max: 60, fee: 290, label: "51-60片" },
            { max: 70, fee: 320, label: "61-70片" },
            { max: 90, fee: 350, label: "71-90片" },
            { max: 129, fee: 380, label: "91-129片" }
        ];

        let boxCount = Math.floor(totalQty / 130);
        let remainder = totalQty % 130;
        let boxFeeTotal = boxCount * 130;
        
        let remData = feeTable.find(t => remainder <= t.max) || { fee: 0, label: "" };
        let totalFee = boxFeeTotal + remData.fee;

        let note = "";
        if (boxCount > 0 && remainder > 0) {
            note = `$${boxFeeTotal}（滿${boxCount * 130}片優惠）+$${remData.fee}（${remData.label}）=$${totalFee}`;
        } else if (boxCount > 0) {
            note = `$${boxFeeTotal}（滿${boxCount * 130}片優惠）`;
        } else {
            note = `$${remData.fee}（${remData.label}）`;
        }
        
        return { fee: totalFee, note: note };
    }

    function scrollToPrice(price) {
        const target = document.getElementById(`section-${price}`);
        if (target) {
            // 因為現在是兩列按鈕，導覽列變高了，補償量增加到約 145px
            const offset = 145; 
            const bodyRect = document.body.getBoundingClientRect().top;
            const elementRect = target.getBoundingClientRect().top;
            const elementPosition = elementRect - bodyRect;
            const offsetPosition = elementPosition - offset;

            window.scrollTo({
                top: offsetPosition,
                behavior: 'smooth'
            });
        }
    }

    function initMenu() {
        let menuHtml = '';
        let navHtml = '';
        menuData.forEach(group => {
            navHtml += `<div class="nav-price-btn" onclick="scrollToPrice(${group.price})">$${group.price}</div>`;
            menuHtml += `<span class="section-h" id="section-${group.price}">${group.price} 元區</span>`;
            group.items.forEach(name => {
                menuHtml += `<div class="opt-row i-opt" data-price="${group.price}" data-name="${name}" onclick="setI(this)">
                    <span class="opt-name">${name}</span>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="adj(this,-1)">-1</button>
                        <input type="number" class="qty-input" value="1" onchange="this.value=Math.max(1,this.value)" onclick="event.stopPropagation()">
                        <button class="qty-btn" onclick="adj(this,1)">+1</button>
                        <button class="btn-quick-add" onclick="quickAdd(this)">✓</button>
                    </div>
                </div>`;
            });
        });
        document.getElementById('menu-container').innerHTML = menuHtml;
        document.getElementById('price-nav').innerHTML = navHtml;
    }

    function organizeText() {
        const text = document.getElementById('coop-input').value;
        if(!text.trim()) return alert("請貼上清單文字");
        const allItems = menuData.flatMap(g => g.items);
        tempOrders = [];
        let currentPerson = "";
        text.split('\n').forEach(line => {
            let cl = line.replace(/[▫️▪️\[\]👤💰▪]/g, '').trim();
            if(!cl || cl.includes("總計") || cl.includes("運費") || cl.includes("小計") || cl.includes("應付")) return;
            const pm = cl.match(/^([^\\s\\+x:\\d]{2,})/);
            if(pm && !allItems.some(i => pm[1].includes(i))) currentPerson = pm[1].trim();
            allItems.forEach(i => {
                if (cl.includes(i)) {
                    let q = 0, xm = cl.match(new RegExp(`${i}.*?[xX\\+\\*\\s](\\d+)`));
                    if(xm) q = parseInt(xm[1]);
                    else { const pts = cl.split(/\s+/); const lp = pts[pts.length - 1]; if(/^\d+$/.test(lp)) q = parseInt(lp); }
                    if(q > 0 && currentPerson) {
                        let p = 0; menuData.forEach(g => { if(g.items.includes(i)) p = g.price; });
                        tempOrders.push({ userName: currentPerson, item: i, qty: q, price: p });
                    }
                }
            });
        });
        if(tempOrders.length > 0) {
            document.getElementById('report-list').innerHTML = tempOrders.map(o => `<b>${o.userName}</b>：${o.item} x ${o.qty}`).join('<br>');
            document.getElementById('report-modal').style.display = 'flex';
        } else alert("無法解析");
    }

    function closeReport(confirm) {
        if(confirm) {
            tempOrders.forEach(o => {
                let u = users.find(x => x.name === o.userName);
                if(!u) { u = {name: o.userName, orders: []}; users.push(u); }
                let ex = u.orders.find(ord => ord.n === o.item);
                if(ex) ex.q += o.qty; else u.orders.push({n: o.item, p: o.price, q: o.qty});
            });
            document.getElementById('coop-input').value = ''; 
            if(cur < 0) cur = 0; render();
        }
        document.getElementById('report-modal').style.display = 'none';
    }

    function showM(s){ document.getElementById('modal').style.display=s?'flex':'none'; }
    function addU(){ 
        let n=document.getElementById('name-in').value.trim(); 
        if(n){ users.push({name:n,orders:[]}); cur=users.length-1; showM(false); render(); }
    }
    function setI(el){ document.querySelectorAll('.i-opt').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
    function adj(btn,d){ event.stopPropagation(); let input=btn.parentNode.querySelector('.qty-input'); let v=(parseInt(input.value) || 0)+d; if(v<1) v=1; input.value=v; }
    function quickAdd(btn) {
        event.stopPropagation(); if(cur < 0) return alert("請先新增或選擇人員");
        let row = btn.closest('.i-opt'), q = parseInt(row.querySelector('.qty-input').value) || 1;
        let n = row.dataset.name, p = parseInt(row.dataset.price);
        let ex = users[cur].orders.find(o => o.n === n);
        if (ex) ex.q += q; else users[cur].orders.push({ n:n, p:p, q:q });
        row.querySelector('.qty-input').value = 1; render();
    }

    function render(){
        let th='<button class="btn-add" onclick="showM(true)">+ 新增</button>', tQ=0, tM=0;
        users.forEach((u,i)=>{ 
            let uQ = u.orders.reduce((s,o)=>s+o.q, 0); tQ += uQ;
            tM += u.orders.reduce((s,o)=>s+(o.p*o.q), 0);
            th+=`<div class="user-tab ${i===cur?'active':''}" onclick="cur=${i};render()">
                <span>${u.name}</span>${uQ>0?`<span class="cart-count">${uQ}</span>`:''}<span class="del-u" onclick="event.stopPropagation();if(confirm('刪除？')){users.splice(${i},1);if(cur==${i})cur=-1;render()}">×</span>
            </div>`;
        });
        document.getElementById('tabs').innerHTML=th;
        if(cur>=0 && users[cur]){
            document.getElementById('welcome').style.display='none'; document.getElementById('order-ui').style.display='block';
            document.getElementById('cur-u-name').innerText=`👤 ${users[cur].name}`;
            document.getElementById('items-box').innerHTML = users[cur].orders.map((o,oi)=>`<div class="order-item"><div><b>${o.n}</b> ($${o.p})<br><small>${o.q}片 = $${o.p*o.q}</small></div><button onclick="users[${cur}].orders.splice(${oi},1);render()" style="color:var(--red);border:1px solid;padding:5px;border-radius:5px;background:none;">刪除</button></div>`).join('') || '<p style="text-align:center;color:#aaa">點選下方口味加入</p>';
        } else { document.getElementById('welcome').style.display='block'; document.getElementById('order-ui').style.display='none'; }
        let f = getFeeInfo(tQ);
        document.getElementById('t-qty').innerText = tQ;
        document.getElementById('total').innerText = tM + f.fee;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    function goLine(){
        if(!users.some(u=>u.orders.length)) return alert("目前沒有訂單內容");
        let m="【🍞 厚片吐司團購彙整報表】\n\n", tQ=0, tM=0, smry={};
        users.forEach(u=>{
            if(u.orders.length){
                let uQ = u.orders.reduce((s,o)=>s+o.q,0), uM = u.orders.reduce((s,o)=>s+(o.p*o.q),0);
                tQ += uQ; tM += uM;
                m += `👤 [${u.name}]：${uQ}片\n`;
                u.orders.forEach(o=>{ m += `▫️ ${o.n} ($${o.p}) x ${o.q}\n`; smry[o.n] = (smry[o.n] || 0) + o.q; });
                m += `💰 小計：$${uM}\n\n`;
            }
        });
        let f = getFeeInfo(tQ);
        m += `==================\n📦 【出貨統計總表】\n`;
        Object.keys(smry).sort().forEach(k => { m += `▪️ ${k}：${smry[k]} 片 ${(smry[k]%5===0)?'':'⚠️'}\n`; });
        m += `==================\n🏠 總片數：${tQ} 片\n🚚 運費：${f.note}\n💰 總應付：$${tM + f.fee} 元`;
        window.location.href="https://line.me/R/msg/text/?"+encodeURIComponent(m);
    }

    window.onload = function() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) users = JSON.parse(saved);
        initMenu(); render();
    };
</script>
</body>
</html>
